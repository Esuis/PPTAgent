version: '3.8'

services:
  # 前端服务（生产模式 + 开发热更新）
  frontend:
    image: deeppresenter-frontend:prd
    container_name: deeppresenter-frontend
    ports:
      - "3000:80"  # 外部3000映射到容器内Nginx 80端口
    volumes:
      # 挂载源码目录（代码修改自动触发构建）
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ./frontend/package.json:/app/frontend/package.json
      # 挂载 tsconfig 配置文件
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/frontend/tsconfig.node.json
      # 排除node_modules和dist（使用容器内的）
      - /app/frontend/node_modules
      - /app/frontend/dist
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - deeppresenter-network

  # 后端API服务
  backend:
    image: deeppresenter-backend:latest
    container_name: deeppresenter-backend
    ports:
      - "8000:8000"
    volumes:
      # 挂载Docker socket（用于创建sandbox容器）
      - /var/run/docker.sock:/var/run/docker.sock
      # 挂载整个deeppresenter目录（开发模式，代码修改即时生效）
      - ./deeppresenter:/usr/src/pptagent/deeppresenter
      # 排除node_modules（使用镜像内预构建的）
      - /usr/src/pptagent/deeppresenter/html2pptx/node_modules
      # 挂载pptagent目录
      - ./pptagent:/usr/src/pptagent/pptagent
      # 挂载配置文件（覆盖镜像内的配置）
      - ./deeppresenter/config.yaml:/usr/src/pptagent/deeppresenter/config.yaml:ro
      - ./deeppresenter/mcp.json:/root/.config/deeppresenter/mcp.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./lid.176.bin:/opt/workspace/lid.176.bin:ro
      # 挂载工作空间（绑定挂载到主机目录，与 sandbox 共享文件）
      - ./workspace:/opt/workspace
      # 挂载缓存
      - cache-data:/root/.cache/deeppresenter
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CONFIG_FILE=/root/.config/deeppresenter/config.yaml
      - MCP_FILE=/root/.config/deeppresenter/mcp.json
      - DEEPPRESENTER_WORKSPACE_BASE=/opt/workspace
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - deeppresenter-network

volumes:
  workspace-data:
    driver: local
    name: deeppresenter-workspace
  cache-data:
    driver: local
    name: deeppresenter-cache

networks:
  deeppresenter-network:
    driver: bridge
